<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>「辦」識AI 系列 - 從零開始 | Future Lab x Fashion</title>
    <!-- 引入更有設計感的字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <!-- 保留 Coze SDK -->
    <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.6/libs/oversea/index.js"></script>
    <style>
        /* --- 明亮版 Cyber Fashion 核心變量 --- */
        :root {
            --bg-color: #ffffff; /* 純白背景 */
            --card-bg: #ffffff; /* 卡片也是純白 */
            --text-main: #000000; /* 純黑文字 */
            --text-muted: #666666; /* 深灰文字 */
            /* 點綴色：從霓虹轉為柔和的電光幻彩 */
            --primary-light: #a2d2ff; /* 柔和電光藍 */
            --secondary-light: #cdb4db; /* 柔和科技紫 */
            --accent-glow: rgba(162, 210, 255, 0.5); /* 藍色光暈 */
            
            --cyber-font: 'Syncopate', sans-serif; /* 科技感標題 */
            --body-font: 'Noto Sans TC', sans-serif;
            --mono-font: 'Space Mono', monospace; /* 數據感字體 */
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- 基礎樣式重置 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: var(--body-font);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* 增加背景細節：微弱的、發光的點陣 */
        body::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(var(--accent-glow) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: 0;
        }

        /* --- 時尚卡片容器 (明亮版) --- */
        .card {
            background: var(--card-bg);
            padding: 80px 60px;
            border-radius: 0px; /* 保留直角，高級感 */
            /* 使用極細的銀色邊框或淡淡的幻彩投影 */
            border: 1px solid #eeeeee;
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: row; /* 左右佈局 */
            align-items: center;
            gap: 50px;
            position: relative;
            z-index: 1;
            transition: box-shadow 0.5s var(--ease);
            /* 淡淡的藍色呼吸光暈 */
            box-shadow: 0 0 30px rgba(162, 210, 255, 0.1);
        }

        .card:hover {
            box-shadow: 0 0 50px rgba(162, 210, 255, 0.2);
        }

        /* 響應式：手機端變回上下佈局 */
        @media (max-width: 768px) {
            .card {
                flex-direction: column;
                padding: 40px 20px;
                gap: 30px;
            }
        }

        /* --- 左側：媒體區域 (圖片 + 影片) --- */
        .media-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        /* 圖片框樣式 - 極簡化 */
        .photo-frame {
            width: 100%;
            height: 180px;
            background-color: #f5f5f5;
            overflow: hidden;
            border-radius: 0px;
            border: 1px solid #eeeeee;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 預設不再全黑白，保持清晰 bright 感覺 */
            filter: contrast(110%) brightness(105%);
        }

        /* 影片框樣式 - 明亮 Cyber 化 */
        .video-wrapper {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9; /* 轉為標準寬屏，更像時裝秀大螢幕 */
            border-radius: 0px;
            overflow: hidden;
            background-color: #000; /* 影片本身還是黑底 */
            /* 用柔和藍色邊框 */
            border: 2px solid var(--primary-light);
            box-shadow: 0 0 20px var(--accent-glow);
            position: relative;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- 右側：文本區域 --- */
        .text-section {
            flex: 1.3;
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 時尚排版的小標題 - 轉為紫色 */
        .subtitle {
            font-family: var(--mono-font);
            color: var(--secondary-light);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 15px;
            display: block;
            font-weight: 700;
        }

        h1 {
            font-family: var(--cyber-font);
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.1;
            margin-bottom: 25px;
            letter-spacing: -1.5px;
            text-transform: uppercase;
            /* 增加輕微的文字陰影，使其看起來更「亮」 */
            text-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        p {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.9;
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* --- 狀態標籤 - 明亮數據感 --- */
        .status-badge {
            font-family: var(--mono-font);
            display: inline-block;
            background: transparent;
            color: var(--text-main); /* 預設文字黑色 */
            padding: 12px 24px;
            border: 1px solid #dddddd; /* 預設細灰邊框 */
            border-radius: 0px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: all 0.4s var(--ease);
        }

        .status-badge::before {
            content: '';
            display: inline-block;
            width: 8px; height: 8px;
            background-color: #dddddd; /* 預設灰色圓點 */
            margin-right: 12px;
            border-radius: 50%;
        }

        /* 連接成功後的樣式 - 轉為電光藍 */
        .status-badge.ready {
            color: var(--text-main);
            border-color: var(--primary-light);
            background-color: #ffffff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .status-badge.ready::before {
            background-color: var(--primary-light); /* 藍色圓點 */
            animation: pulse-blue 1.5s infinite;
        }

        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0px rgba(162, 210, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(162, 210, 255, 0); }
            100% { box-shadow: 0 0 0 0px rgba(162, 210, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- 左側媒體區 -->
        <div class="media-section">
            <div class="photo-frame">
                <img src="https://github.com/Catherine-315/Coze---testing/blob/main/SDgroup.png?raw=true" alt="活動相片">
            </div>

            <div class="video-wrapper">
                <video autoplay muted loop playsinline>
                    <source src="https://github.com/Catherine-315/Coze---testing/raw/refs/heads/main/%E5%A4%9A%E5%90%88%E4%B8%80%20AI%20%E5%9C%98%E9%9A%8A.mp4" type="video/mp4">
                    您的瀏覽器不支援影片播放。
                </video>
            </div>
        </div>

        <!-- 右側文本區 -->
        <div class="text-section">
            <span class="subtitle">Caritas / Future AI Lab / Phase 1</span>
            <h1>「辦」識AI 系列<br>從零開始</h1>
            
            <p>喝杯咖啡，慢下來感受科技。<br>有任何關於活動的查詢或想法，歡迎隨時點擊右下角，與小幫手溫柔對話。</p>
            
            <div class="status-badge" id="status">SYS_INIT_SEQUENCE</div>
        </div>
    </div>

    <script>
      async function initChat() {
        const statusEl = document.getElementById('status');
        try {
          // 1. 從你的 Vercel API 獲取 JWT Token
          const res = await fetch('/api/token');
          const data = await res.json();
          
          if (!data.access_token) {
            statusEl.innerText = "SYS_CONN_ERROR";
            statusEl.style.borderColor = "#ffcccc"; // 淡淡的紅
            statusEl.style.color = "#ff6666";
            return;
          }

          // 2. 更新狀態為 ready (應用新樣式)
          statusEl.innerText = "SYS_READY // ACTIVE";
          statusEl.classList.add('ready');

          // 3. 初始化 Coze Web SDK (使用 JWT 認證模式)
          new CozeWebSDK.WebChatClient({
            config: {
              bot_id: '7662199682715090949', // 你的 Bot ID
              isIframe: false // 懸浮窗模式
            },
            componentProps: {
              title: '明愛社會工作服務小幫手',
            },
            auth: {
              type: 'token', // 必須是 token
              token: data.access_token, // JWT token
              onRefreshToken: async () => {
                // Token 過期時自動刷新
                const refreshRes = await fetch('/api/token');
                const refreshData = await refreshRes.json();
                return refreshData.access_token;
              }
            },
            userInfo: {
              id: data.user_id, // 來自 API 的 user_id
              nickName: "Catherine",
            }
          });
        } catch (err) {
          console.error("初始化聊天室失敗：", err);
          statusEl.innerText = "CRITICAL_SYS_FAIL";
          statusEl.style.borderColor = "#ffcccc";
          statusEl.style.color = "#ff6666";
        }
      }

      // 執行初始化
      initChat();
    </script>
</body>
</html>
